controller_manager:
  ros__parameters:
    update_rate: 250

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    forward_position_controller:
      type: forward_command_controller/ForwardCommandController

    position_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController
    
    motion_primitive_forward_controller:
      type: motion_primitives_controllers/MotionPrimitivesForwardController

    motion_primitive_from_trajectory_controller:
      type: motion_primitives_controllers/MotionPrimitivesFromTrajectoryController

forward_position_controller:
  ros__parameters:
    joints:
      - joint_a1
      - joint_a2
      - joint_a3
      - joint_a4
      - joint_a5
      - joint_a6
    interface_name: position

position_trajectory_controller:
  ros__parameters:
    joints:
      - joint_a1
      - joint_a2
      - joint_a3
      - joint_a4
      - joint_a5
      - joint_a6

    command_interfaces:
      - position

    state_interfaces:
      - position

    state_publish_rate: 2.0 # Defaults to 50
    action_monitor_rate: 2.0 # Defaults to 20

    allow_partial_joints_goal: false # Defaults to false
    open_loop_control: true
    allow_integration_in_goal_trajectories: true
    constraints:
      stopped_velocity_tolerance: 0.01 # Defaults to 0.01
      goal_time: 0.0 # Defaults to 0.0 (start immediately)

motion_primitive_forward_controller:
  ros__parameters:
    # tf_prefix: "$(var tf_prefix)"
    tf_prefix: ""

motion_primitive_from_trajectory_controller:
  ros__parameters:
    # tf_prefix: "$(var tf_prefix)"
    tf_prefix: ""
    local_joint_order:
      - joint_a1
      - joint_a2
      - joint_a3
      - joint_a4
      - joint_a5
      - joint_a6
    approximate_mode: "RDP_PTP"  # "RDP_LIN" or "RDP_PTP"
    use_time_not_vel_and_acc: false
    epsilon_joint_angle: 0.01
    epsilon_cart_position: 0.01
    epsilon_cart_angle: 0.05
    # blend_radius_overwrite: 0.01
    # joint_vel_overwrite: 0.5
    # joint_acc_overwrite: 0.5
    # cart_vel_overwrite: 5.0
    # cart_acc_overwrite: 5.0